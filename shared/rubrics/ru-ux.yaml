# Reusable Russian UX rubrics for llm-rubric / g-eval (DeepSeek judge).
#
# Use as the `value:` of an llm-rubric assertion, e.g.:
#   - type: llm-rubric
#     value: file://../../eval-commons/shared/rubrics/ru-ux.yaml#polite_helpful_ru
#
# DISCIPLINE (see memory: donation-choice-surfaces-rule):
#   Judge user-facing Russian wording only. NEVER ask the judge to grade technical
#   identifiers (model/driver/service names) — those are canonical and self-matchable.
#
# CALIBRATION: these rubrics are starting points. Validate judge↔human agreement on a
# small human-scored Russian set before trusting scores in CI (ARCHITECTURE.md §7.1).

polite_helpful_ru: >
  Ответ ассистента на русском языке: (1) вежливый и естественно звучащий,
  (2) прямо отвечает на запрос пользователя, (3) не содержит англоязычных вставок
  или машинного «канцелярита», (4) краток и уместен для голосового интерфейса.
  Оцени как пройдено, только если выполнены все четыре условия.

confirms_action_ru: >
  Ответ оценивается как подтверждение выполненного действия. Оцени как пройдено ТОЛЬКО
  если одновременно выполнены ВСЕ условия: (1) ответ полностью на русском языке, без
  англоязычных слов или фраз; (2) ясно и однозначно подтверждено, что запрошенное
  действие выполнено (например «готово», «включил», «таймер установлен»), без
  неоднозначности об успехе; (3) нет сырой технической ошибки или трейсбека.
  Технические идентификаторы устройств оценивать не нужно. Если хотя бы одно условие
  не выполнено — оцени как НЕ пройдено.

graceful_failure_ru: >
  Ответ оценивается как сообщение о невозможности выполнить действие. Оцени как пройдено
  ТОЛЬКО если одновременно выполнены ВСЕ условия: (1) ответ полностью на русском языке,
  без англоязычных слов или фраз; (2) тон вежливый и доброжелательный, без грубости;
  (3) нет сырой технической ошибки, кода ошибки или трейсбека; (4) проблема объяснена
  понятно и человекочитаемо, по возможности предложен следующий шаг. Если хотя бы одно
  условие не выполнено — оцени как НЕ пройдено.
