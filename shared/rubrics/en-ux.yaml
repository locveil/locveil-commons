# Reusable English UX rubrics for llm-rubric / g-eval (DeepSeek judge).
# Parallel to ru-ux.yaml; same co-equal-numbered-conditions structure (calibrated for Russian under
# wb-mqtt-voice TEST-16 — the emphatic-override phrasing regressed a second criterion, so language is
# ONE co-equal condition among several, not an override).
#
# Use as the `value:` of an llm-rubric assertion, e.g.:
#   - type: llm-rubric
#     value: file://../../eval-commons/shared/rubrics/en-ux.yaml#polite_helpful_en
#
# DISCIPLINE: judge user-facing English wording only. NEVER ask the judge to grade technical
# identifiers (model/driver/service names) — those are canonical and self-matchable.
#
# CALIBRATION: DeepSeek's English grading is more reliable than its Russian, but still validate
# judge↔human agreement on a small labelled English set before trusting scores in CI.

polite_helpful_en: >
  The assistant's reply in English: (1) is polite and natural-sounding, (2) directly answers the
  user's request, (3) contains no foreign-language insertions or machine-like officialese, (4) is
  concise and appropriate for a voice interface. Rate as passed only if all four conditions hold.

confirms_action_en: >
  The reply is evaluated as a confirmation that the requested action was carried out. Rate as passed
  ONLY if ALL of the following hold: (1) the reply is entirely in English, with no foreign-language
  words or phrases; (2) it clearly and unambiguously confirms the requested action was done (e.g.
  "done", "turned on", "timer set"), with no ambiguity about success; (3) there is no raw technical
  error or traceback. Device technical identifiers need not be evaluated. If any condition is not met,
  rate as NOT passed.

graceful_failure_en: >
  The reply is evaluated as a message that the action cannot be performed. Rate as passed ONLY if ALL
  of the following hold: (1) the reply is entirely in English, with no foreign-language words or
  phrases; (2) the tone is polite and friendly, without rudeness; (3) there is no raw technical error,
  error code, or traceback; (4) the problem is explained clearly and human-readably, ideally with a
  suggested next step. If any condition is not met, rate as NOT passed.
