# locveil-commons scope-guard config (HK-1/PROD-13; convention: process/ledger-discipline.md)

[ledger]
active = "board/BOARD.md"
done = "board/BOARD_DONE.md"
archive_dir = "board/archive/ledger"
prefixes = ["PROD", "HK", "IMPL"]
open_statuses = [" ", ">"]
require_sections = true                  # per-prefix sections (## PROD — …, ## HK — …); owner finding 2026-07-11
sections_required_for_all = true
high_water = 3000
low_water = 2000
hard_ceiling = 4000
docs_verdict_since = "2026-07-13"   # HK-6: completions from this date need a docs: verdict (2026-07-12 entries predate the rule, frozen)

[evidence]
dirs = ["docs/design", "docs/review"]   # HK-10: review docs join evidence anchoring
link_scan = true
unreferenced = "error"                  # IMPL-2: error in commons; consumers default warn

[journal]
active = "board/JOURNAL.md"
archive_dir = "board/archive/journal"
high_water = 1500
low_water = 1000
hard_ceiling = 2000
completion_crosscheck = true
archive_pointer = true

[board]
delegation_writeback = true

[claude]
file = "CLAUDE.md"
