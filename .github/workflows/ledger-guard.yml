name: ledger-guard

on:
  push:
    branches: [main]
    paths:
      - "board/**"
      - "docs/design/**"
      - "CLAUDE.md"
      - "process/claude-blocks/**"
      - "packages/scope-guard/**"
      - ".scope-guard.toml"
      - ".github/workflows/ledger-guard.yml"
  pull_request:
    paths:
      - "board/**"
      - "docs/design/**"
      - "CLAUDE.md"
      - "process/claude-blocks/**"
      - "packages/scope-guard/**"
      - ".scope-guard.toml"
      - ".github/workflows/ledger-guard.yml"

jobs:
  ledger-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # --check only: CI never mutates (process/ledger-discipline.md §4).
      # Over high-water prints a warning (exit 0); over hard ceiling fails.
      - run: python3 packages/scope-guard/scope_guard.py --config .scope-guard.toml
