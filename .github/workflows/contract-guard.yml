# contract-guard CI (HK-5/PROD-16; convention: process/contracts.md §4) — layer-1
# coherence only, --check only. Path-gated like ledger-guard.
name: contract-guard

on:
  push:
    paths:
      - "contracts/**"
      - "packages/contract-guard/**"
      - ".github/workflows/contract-guard.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "packages/contract-guard/**"
      - ".github/workflows/contract-guard.yml"

jobs:
  contract-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # PROD-25 (amended): TAG-MISSING resolves owned STAMP tags via `git tag -l`; the
      # default checkout is tag-less, and `fetch-tags: true` never delivers the tags
      # (actions/checkout#1467 — commons' own run 29414186194 failed with the flag set).
      # Explicit fetch per the OPS-9 reference; shallow stays fine.
      - name: Fetch tags
        run: git fetch --tags --depth=1 origin
      - name: contract-guard --check
        run: python3 packages/contract-guard/contract_guard.py --check
