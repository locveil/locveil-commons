[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "locveil-core-py"
version = "1.0.0"
description = "Locveil shared Python core (PROD-8) — the entry-point-group discovery engine (DynamicLoader), stdlib-only"
requires-python = ">=3.11"
license = "MIT"

[tool.setuptools]
py-modules = ["entry_point_loader"]
