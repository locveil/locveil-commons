# Starter .scope-guard.toml for locveil-bridge (HK-1/PROD-13 delegation).
# Copy to the bridge repo root as `.scope-guard.toml`; vendor scope_guard.py at scope-v1.

[ledger]
active = "docs/action_plan.md"
done = "docs/action_plan_DONE.md"
archive_dir = "docs/archive/ledger"      # created by the first DONE rotation
aliases = "docs/action_plan_aliases.md"
prefixes = ["DRV", "SCN", "VWB", "UI", "OPS", "CORE", "DOC", "REL"]
open_statuses = [" ", "~"]
require_sections = true
sections_required_for_all = true         # bridge: every task row inside a PFX section
tombstones = true
high_water = 3000
low_water = 2000
hard_ceiling = 4000

[evidence]
dirs = ["docs/design", "docs/review"]
index = false
link_scan = true                         # ledger references docs/design|review paths

[journal]
active = "docs/action_plan_journal.md"
archive_dir = "docs/archive/journal"
high_water = 1500
low_water = 1000
hard_ceiling = 2000
completion_crosscheck = false            # predates the journal — would flag history
archive_pointer = true

# [claude] — enable after inserting the pinned blocks (HK-2/PROD-5; process/claude-md.md).
# Hashes: python3 scripts/scope_guard.py --config .scope-guard.toml --hash-blocks
#[claude]
#file = "CLAUDE.md"
#[[claude.blocks]]
#name = "shared-invariants"
#sha256 = ""
#[[claude.blocks]]
#name = "cross-repo-board"
#sha256 = ""
