# Starter .scope-guard.toml for a new Locveil repo (rename files freely — naming is config)

[ledger]
active = "docs/LEDGER.md"
done = "docs/LEDGER_DONE.md"
archive_dir = "docs/archive/ledger"
prefixes = []                            # e.g. ["SAT", "DOC", "REL"]
open_statuses = [" ", "~"]
require_sections = true
sections_required_for_all = true
high_water = 3000
low_water = 2000
hard_ceiling = 4000

docs_verdict_since = ""            # set to the repo's birth date — completions need a docs: verdict (process/user-docs.md §3)

[evidence]
dirs = ["docs/design", "docs/review"]
link_scan = true

[journal]
active = "docs/JOURNAL.md"
archive_dir = "docs/archive/journal"
high_water = 1500
low_water = 1000
hard_ceiling = 2000
archive_pointer = true

[claude]
file = "CLAUDE.md"
[[claude.blocks]]
name = "shared-invariants"
sha256 = ""                              # scope_guard.py --hash-blocks
[[claude.blocks]]
name = "cross-repo-board"
sha256 = ""
